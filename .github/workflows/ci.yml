name: Test CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Install tokei and ripgrep
        uses: taiki-e/install-action@v2
        with:
          tool: tokei,ripgrep

      - name: Check Rust file line limits
        run: bash scripts/check-rust-line-limit.sh

      - name: Check for inline test modules
        run: bash scripts/check-rust-test-modules.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JavaScript formatting
        run: npm run fmt:js:check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Oxlint
        run: npm run lint:js

      - name: Run npm tests
        run: npm test --ignore-scripts

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Enforce Rust coverage
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --all-features \
            --ignore-filename-regex 'crates/(no-mistakes|next-to-fetch|playwright-ast-coverage|queue-ast-hop|react-traits|server-ast-routes)/src/main\.rs$|crates/(next-to-fetch|queue-ast-hop|react-traits|server-ast-routes)/src/cli\.rs$|crates/next-to-fetch/src/pipeline/route_analysis\.rs$|crates/no-mistakes-core/src/(codebase/.*|queue/resolver|server_routes/.*)\.rs$|crates/playwright-ast-coverage/src/analysis/(app_collect|discover|fetch|selectors_index|test_file|tests_report)\.rs$|crates/playwright-ast-coverage/src/playwright_config/(load|parse)\.rs$|crates/playwright-ast-coverage/src/playwright_urls/(literals|visitor)\.rs$|crates/playwright-ast-coverage/src/selectors/call_shapes\.rs$|crates/react-traits/src/pipeline/check\.rs$|crates/server-ast-routes/src/report\.rs$' \
            --fail-under-lines 100 --fail-under-functions 100 --show-missing-lines --lcov --output-path target/llvm-cov/lcov.info

      - name: Upload Rust coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: target/llvm-cov/lcov.info
          flags: rust
          fail_ci_if_error: true

      - name: Upload JavaScript coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: javascript
          fail_ci_if_error: true
