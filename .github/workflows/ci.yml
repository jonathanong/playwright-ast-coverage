name: Test CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Install tokei and ripgrep
        uses: taiki-e/install-action@v2
        with:
          tool: tokei,ripgrep

      - name: Install shell tools
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Validate Codecov config
        run: curl --data-binary @codecov.yml https://codecov.io/validate

      - name: Check Rust file line limits
        run: bash scripts/check-rust-line-limit.sh

      - name: Check for inline test modules
        run: bash scripts/check-rust-test-modules.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JavaScript formatting
        run: npm run fmt:js:check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Oxlint
        run: npm run lint:js

      - name: Run Shellcheck
        run: npm run lint:shell

      - name: Run CSpell
        run: npm run lint:spell

      - name: Build JavaScript packages
        run: npm run build:js

      - name: Run npm tests
        run: npm run test:ci --ignore-scripts

      - name: Check Cargo packages
        run: |
          cargo publish --dry-run --locked -p no-mistakes-core
          for pkg in no-mistakes playwright-ast-coverage next-to-fetch queue-ast-hop react-traits server-ast-routes; do
            cargo package --list --locked -p "$pkg" >/dev/null
          done

      - name: Check npm packages
        run: npm pack --dry-run --workspaces

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Show Rust coverage table (debug)
        run: |
          cargo llvm-cov --workspace --all-features \
            --show-missing-lines 2>&1 | tail -60
        continue-on-error: true

      - name: Enforce Rust coverage
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --all-features \
            --fail-under-lines 99 --fail-under-functions 99 --show-missing-lines --lcov --output-path target/llvm-cov/lcov.info

      - name: Install cargo-crap
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-crap

      - name: Enforce CRAP threshold
        run: cargo crap --lcov target/llvm-cov/lcov.info --fail-above --threshold 30

      - name: Upload Rust coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: target/llvm-cov/lcov.info
          flags: rust
          fail_ci_if_error: true

      - name: Upload JavaScript coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: javascript
          fail_ci_if_error: true

  scripts:
    name: no-mistakes-scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Install Linux script tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Install macOS script tools
        if: runner.os == 'macOS'
        run: brew install jq shellcheck ripgrep tokei

      - name: Install Linux Rust script tools
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: tokei,ripgrep

      - name: Run Shellcheck
        run: npm run lint:shell

      - name: Run script package tests
        run: npx vitest run packages/no-mistakes-scripts/scripts/bin.test.js --coverage.enabled=false

      - name: Run script package tests from source archive
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          archive_root="$RUNNER_TEMP/source-archive"
          mkdir -p "$archive_root"
          git archive --format=tar HEAD | tar -x -C "$archive_root"
          cd "$archive_root"
          npm ci --ignore-scripts
          npx vitest run packages/no-mistakes-scripts/scripts/bin.test.js --coverage.enabled=false
