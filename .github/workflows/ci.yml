name: Test CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Validate Codecov config
        run: curl --data-binary @codecov.yml https://codecov.io/validate

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JavaScript formatting
        run: npm run fmt:js:check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Oxlint
        run: npm run lint:js

      - name: Run no-mistakes check
        run: cargo run -p no-mistakes --quiet -- check

      - name: Run graph benchmarks
        run: cargo bench -p no-mistakes-core --bench graph_related -- --noplot

      - name: Run CSpell
        run: npm run lint:spell

      - name: Build JavaScript packages
        run: npm run build:js

      - name: Run npm tests
        run: npm run test:ci --ignore-scripts

      - name: Check Cargo packages
        run: |
          cargo publish --dry-run --locked -p no-mistakes-core
          for pkg in no-mistakes playwright-ast-coverage next-to-fetch queue-ast-hop react-traits server-ast-routes; do
            cargo package --list --locked -p "$pkg" >/dev/null
          done

      - name: Check npm packages
        run: npm pack --dry-run --workspaces

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Show Rust coverage table (debug)
        run: |
          cargo llvm-cov --workspace --all-features \
            --show-missing-lines 2>&1 | tail -60
        continue-on-error: true

      - name: Enforce Rust coverage
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --all-features \
            --fail-under-lines 99 --fail-under-functions 99 --show-missing-lines --lcov --output-path target/llvm-cov/lcov.info

      - name: Install cargo-crap
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: cargo-crap

      - name: Enforce CRAP threshold
        run: cargo crap --lcov target/llvm-cov/lcov.info --fail-above --threshold 30 --missing skip

      - name: Upload Rust coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: target/llvm-cov/lcov.info
          flags: rust
          fail_ci_if_error: true

      - name: Upload JavaScript coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: javascript
          fail_ci_if_error: true
