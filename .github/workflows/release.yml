name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Check RELEASE_TOKEN is set
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::RELEASE_TOKEN secret is not set. This workflow requires a PAT that can push release commits and tags to main." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions, commit, and tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          npm version "${{ inputs.bump }}" --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          
          # Bump npm workspace versions
          for pkg in eslint-plugin-playwright-ast-coverage no-mistakes-core next-to-fetch playwright-ast-coverage; do
            npm version "$version" --workspace "$pkg" --no-git-tag-version
            if [[ "$pkg" == "playwright-ast-coverage" || "$pkg" == "next-to-fetch" ]]; then
              npm pkg set "dependencies.no-mistakes-core=^$version" --workspace "$pkg"
            fi
          done
          npm install --package-lock-only

          # Bump Rust crate versions
          node - "$version" <<'NODE'
            const fs = require("node:fs");
            const version = process.argv[2];
            const crates = [
              "Cargo.toml",
              "crates/no-mistakes-core/Cargo.toml",
              "crates/next-to-fetch/Cargo.toml",
              "crates/playwright-ast-coverage/Cargo.toml",
            ];
            for (const file of crates) {
              if (!fs.existsSync(file)) continue;
              let cargo = fs.readFileSync(file, "utf8").replace(
                /^version = ".*"$/m,
                `version = "${version}"`,
              );
              cargo = cargo.replace(
                /(\s*no-mistakes-core\s*=\s*\{[^{}]*\bversion\s*=\s*)"[^"]*"/g,
                `$1"${version}"`,
              );
              fs.writeFileSync(file, cargo);
            }
          NODE
          
          cargo update -w
          git add .
          git commit -m "chore(release): v$version"
          git tag -a "v$version" -m "v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags

  validate:
    name: Validate
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-release
          cache-bin: "false"

      - name: Install npm dependencies
        run: SKIP_BINARY_DOWNLOAD=1 npm ci

      - name: Install tokei
        uses: taiki-e/install-action@v2
        with:
          tool: tokei

      - name: Verify versions
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.version }}"
          cargo_version="$(cargo metadata --no-deps --format-version 1 | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d).packages[0].version));")"
          npm_version="$(node -p "require('./package.json').version")"
          test "$tag" = "$cargo_version"
          test "$tag" = "$npm_version"

      - name: Check Rust file line limits
        run: bash scripts/check-rust-line-limit.sh

      - name: Check for inline test modules
        run: bash scripts/check-rust-test-modules.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JavaScript formatting
        run: npm run fmt:js:check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Oxlint
        run: npm run lint:js

      - name: Run Rust tests
        run: cargo test --all-features

      - name: Run npm tests
        run: npm test

      - name: Check Cargo packages
        run: |
          for pkg in no-mistakes-core playwright-ast-coverage next-to-fetch; do
            cargo publish --dry-run --locked -p "$pkg"
          done

      - name: Check npm packages
        run: |
          for pkg in playwright-ast-coverage eslint-plugin-playwright-ast-coverage no-mistakes-core next-to-fetch; do
            npm pack --dry-run --workspace "$pkg"
          done

  build:
    name: Build ${{ matrix.target_binary }} for ${{ matrix.target }}
    needs:
      - prepare
      - validate
    strategy:
      fail-fast: false
      matrix:
        target_binary: [playwright-ast-coverage, next-to-fetch]
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-release
          cache-bin: "false"

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p ${{ matrix.target_binary }}

      - name: Set artifact name
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            *windows*) ext=".exe" ;;
            *) ext="" ;;
          esac
          echo "artifact=${{ matrix.target_binary }}-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}$ext" >> "$GITHUB_ENV"
          echo "binary=${{ matrix.target_binary }}$ext" >> "$GITHUB_ENV"

      - name: Verify binary
        shell: bash
        run: target/${{ matrix.target }}/release/${{ env.binary }} --version

      - name: Stage asset
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ env.binary }}" "${{ env.artifact }}"

      - name: Generate checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: shasum -a 256 "${{ env.artifact }}" > "${{ env.artifact }}.sha256"

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "${{ env.artifact }}"
          $hash = (Get-FileHash -Algorithm SHA256 -Path $artifact).Hash.ToLowerInvariant()
          "$hash  $artifact" | Set-Content -Encoding ascii -NoNewline "$artifact.sha256"

      - name: Upload asset artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.artifact }}
          path: |
            ${{ env.artifact }}
            ${{ env.artifact }}.sha256
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - prepare
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish Cargo crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          for pkg in no-mistakes-core playwright-ast-coverage next-to-fetch; do
            if curl --fail --silent --output /dev/null "https://crates.io/api/v1/crates/$pkg/$version"; then
              echo "$pkg $version is already published on crates.io; skipping"
            else
              if [ "$pkg" != "no-mistakes-core" ]; then
                for attempt in 1 2 3 4 5; do
                  echo "Checking whether no-mistakes-core@$version is visible for $pkg publish..."
                  if curl --fail --silent --output /dev/null "https://crates.io/api/v1/crates/no-mistakes-core/$version"; then
                    break
                  fi
                  if [ "$attempt" = 5 ]; then
                    echo "Timed out waiting for no-mistakes-core@$version on crates.io"
                    exit 1
                  fi
                  sleep 15
                done
              fi
              cargo publish --locked -p "$pkg"
            fi
          done

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ needs.prepare.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$tag" --generate-notes
          fi

      - name: Publish npm packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${NPM_TOKEN:-}" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          version="${{ needs.prepare.outputs.version }}"
          # Order matters: no-mistakes-core should be first
          for pkg in no-mistakes-core playwright-ast-coverage next-to-fetch eslint-plugin-playwright-ast-coverage; do
            if npm view "$pkg@$version" version >/dev/null 2>&1; then
              echo "$pkg $version is already published on npm; skipping"
            else
              npm publish --provenance --access public --workspace "$pkg"
            fi
          done
