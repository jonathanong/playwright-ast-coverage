name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify versions
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --no-deps --format-version 1 | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d).packages[0].version));")"
          npm_version="$(node -p "require('./package.json').version")"
          test "$tag" = "$cargo_version"
          test "$tag" = "$npm_version"
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --all-features

      - name: Run npm tests
        run: npm test

      - name: Check Cargo package
        run: cargo publish --dry-run --locked

      - name: Check npm package
        run: npm pack --dry-run

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: playwright-ast-coverage-v${{ needs.validate.outputs.version }}-x86_64-apple-darwin
            binary: playwright-ast-coverage
          - os: macos-15
            target: aarch64-apple-darwin
            artifact: playwright-ast-coverage-v${{ needs.validate.outputs.version }}-aarch64-apple-darwin
            binary: playwright-ast-coverage
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: playwright-ast-coverage-v${{ needs.validate.outputs.version }}-x86_64-unknown-linux-gnu
            binary: playwright-ast-coverage
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: playwright-ast-coverage-v${{ needs.validate.outputs.version }}-aarch64-unknown-linux-gnu
            binary: playwright-ast-coverage
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact: playwright-ast-coverage-v${{ needs.validate.outputs.version }}-x86_64-pc-windows-msvc.exe
            binary: playwright-ast-coverage.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify binary
        shell: bash
        run: target/${{ matrix.target }}/release/${{ matrix.binary }} --version

      - name: Stage asset
        shell: bash
        run: |
          set -euo pipefail
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.artifact }}"
          shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      - name: Upload asset artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes

      - name: Smoke test npm tarball install
        shell: bash
        env:
          PLAYWRIGHT_AST_COVERAGE_RELEASE_BASE_URL: file://${{ github.workspace }}/dist
        run: |
          set -euo pipefail
          npm pack
          mkdir npm-smoke
          cd npm-smoke
          npm init -y
          npm install "../playwright-ast-coverage-${{ needs.validate.outputs.version }}.tgz"
          npx playwright-ast-coverage --version

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Publish Cargo crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
