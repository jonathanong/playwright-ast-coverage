rules:
  route-consistency:
    backendPattern: "packages/api/src/**/*.mts"
    backendRegisterObject: "app"
    backendPrefixes: ["/api/v1/"]
    frontendRoot: "packages/web/app"
    scanPatterns: ["packages/web/src/**/*.tsx"]

  queue-dashboard-reachability:
    entrypoint: "packages/api/src/index.mts"
    queuePattern: "packages/api/src/*.mts"
    factorySpecifier: "@data-stores/valkey/glide-mq-factory"
    factoryFunction: "createQueue"
    tsconfig: "tsconfig.json"
